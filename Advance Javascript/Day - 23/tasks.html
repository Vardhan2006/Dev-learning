<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Manager</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#111;
    color:#fff;
    padding:40px;
}

.form-container{
    width:400px;
    margin:0 auto;
    background:#222;
    padding:30px;
    border-radius:10px;
    border:1px solid #333;
}

.heading{
    text-align:center;
    margin-bottom:25px;
}

.form-group{
    margin-bottom:20px;
}

.form-label{
    display:block;
    margin-bottom:8px;
    font-size:14px;
    color:#ccc;
}

.form-input,
.form-textarea{
    width:100%;
    padding:12px;
    background:#333;
    color:white;
    border:1px solid #444;
    border-radius:6px;
    outline:none;
}

.form-textarea{
    resize:none;
    height:90px;
}

.form-input:focus,
.form-textarea:focus{
    border-color:#777;
}

.submit-btn{
    width:100%;
    padding:12px;
    background:transparent;
    color:white;
    border:1px solid #555;
    border-radius:6px;
    cursor:pointer;
    transition:.3s;
}

.submit-btn:hover{
    background:#444;
}

.users{
    margin-top:40px;
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
}

.card{
    width:220px;
    background:#222;
    border:1px solid #333;
    border-radius:10px;
    padding:20px;
    text-align:center;
}

.card img{
    width:90px;
    height:90px;
    border-radius:50%;
    object-fit:cover;
    margin-bottom:15px;
}

.card h3{
    margin-bottom:5px;
}

.card h4{
    color:#aaa;
    font-size:15px;
    margin-bottom:10px;
    font-weight:normal;
}

.card p{
    color:#bbb;
    font-size:14px;
    line-height:1.5;
}
</style>
</head>

<body>

<div class="form-container">

    <h2 class="heading">Add User</h2>

    <form>

        <div class="form-group">
            <label class="form-label" for="name">Name</label>
            <input
                class="form-input"
                type="text"
                id="name"
                name="name"
                required>
        </div>

        <div class="form-group">
            <label class="form-label" for="role">Role</label>
            <input
                class="form-input"
                type="text"
                id="role"
                name="role"
                required>
        </div>

        <div class="form-group">
            <label class="form-label" for="bio">Bio</label>
            <textarea
                class="form-textarea"
                id="bio"
                name="bio"
                rows="3"
                required></textarea>
        </div>

        <div class="form-group">
            <label class="form-label" for="photo">Photo URL</label>
            <input
                class="form-input"
                type="url"
                id="photo"
                name="photo"
                required>
        </div>

        <button
            class="submit-btn"
            type="submit">
            Submit
        </button>

    </form>

</div>

<div class="users">

    <div class="card">
        <img src="https://i.pravatar.cc/150?img=12">
        <h3>John Doe</h3>
        <h4>Frontend Developer</h4>
        <p>Loves building beautiful UIs and learning new technologies.</p>
    </div>

    <div class="card">
        <img src="https://i.pravatar.cc/150?img=32">
        <h3>Jane Smith</h3>
        <h4>Backend Engineer</h4>
        <p>Enjoys solving complex problems and optimizing APIs.</p>
    </div>

    <div class="card">
        <img src="https://i.pravatar.cc/150?img=68">
        <h3>Alex Lee</h3>
        <h4>UI/UX Designer</h4>
        <p>Passionate about user experience and clean design.</p>
    </div>

</div>
    <script src="tasks.js"></script>
</body>
</html>
