<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        #form {
            border: 1px solid;
            height: 12rem;
            width: 13rem;
            padding-right: 13px;
            ;
        }

        #input {
            margin-left: 10px;
            margin-top: 10px;

            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .card {
            margin-top: 40px;
            border: 1px solid;
            max-width: 14rem;
            border-radius: 8px;
            padding: 10px;
        }

        .card h3,
        .card h5,
        .card p {
            margin: 8px 0;
        }

        .profile {
            margin-top: 40px;
            border: 1px solid;
            height: 6rem;
            width: 6rem;
            border-radius: 300px;
            margin-top: 15px;
            overflow: hidden;
            display: flex;
        }

        .profile img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card p {
            font-size: 11px;
            text-align: justify;
            justify-content: center;
        }
    </style>
</head>

<body>

    <div id="main">
        <form action="" id="form">
            <div id="input">
                <input type="text" placeholder="name">
                <input type="text" placeholder="age">
                <input type="text" placeholder="email">
                <input type="file" placeholder="profile Pic">
                <button>Submit</button>
            </div>
        </form>

        <div class="card">
            <div class="profile"><img
                    src="https://images.unsplash.com/photo-1780764895105-ea3037466236?w=1000&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHx0b3BpYy1mZWVkfDMzfHRvd0paRnNrcEdnfHxlbnwwfHx8fHw%3D"
                    alt=""></div>
            <h3>Ola</h3>
            <h5>Developer</h5>
            <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Ducimus, et dolore. Necessitatibus voluptas
                eaque
                quas. Ut, voluptatibus. Fugit, quis hic cupiditate laudantium vitae aut ea, in, tenetur optio placeat
                provident!</p>
        </div>
    </div>

    <script src="Events_2.js"></script>
</body>

</html>
