<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email & Password Validator</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#f4f4f4;
        }

        .container{
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
            width:350px;
        }

        h2{
            text-align:center;
            margin-bottom:20px;
        }

        .form-group{
            margin-bottom:18px;
        }

        label{
            display:block;
            margin-bottom:6px;
            font-weight:bold;
        }

        input{
            width:100%;
            padding:10px;
            border:1px solid #ccc;
            border-radius:5px;
            outline:none;
        }

        input:focus{
            border-color:#007bff;
        }

        .error{
            color:red;
            font-size:12px;
            display:block;
            margin-top:5px;
        }

        button{
            width:100%;
            padding:10px;
            border:none;
            background:#007bff;
            color:white;
            border-radius:5px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#0056b3;
        }

        #resultMessage{
            margin-top:15px;
            text-align:center;
            font-weight:bold;
        }

        .success{
            color:green;
        }

        .failure{
            color:red;
        }
    </style>
</head>
<body>

    <div class="container">

        <h2>Login Validator</h2>

        <form id="loginForm">

            <div class="form-group">
                <label for="email">Email</label>

                <input
                    type="text"
                    id="email"
                    placeholder="Enter your email">

                <small
                    class="error"
                    id="emailError"></small>
            </div>

            <div class="form-group">
                <label for="password">Password</label>

                <input
                    type="password"
                    id="password"
                    placeholder="Enter your password">

                <small
                    class="error"
                    id="passwordError"></small>
            </div>

            <button type="submit">
                Validate
            </button>

        </form>

        <div id="resultMessage">Everything is correct</div>

    </div>

    <script src="email.js"></script>

</body>
</html>
