<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
    <style>
        small {
            color: red;
        }

        #hide {
            display: none;
        }
    </style>
</head>
<body>
    <form>
        <input required id="name" type="text" placeholder="name">  
        <div id="hide">
            <br>
        <small>your name should be greater than 2 characters</small>
        </div>
        <br><br>
        <input type="email" placeholder="email">
        <br><br>
        <input minlength="5" type="password" placeholder="email">
        <br><br>
        <select>
            <option value="male">Male</option>
            <option value="female">Female</option>
        </select>
        <br><br>
        <textarea placeholder="Tell about yourself"></textarea>
        <br><br>
        <button>Submit</button>
    </form>
    <script src="forms.js"></script>
</body>
</html>
