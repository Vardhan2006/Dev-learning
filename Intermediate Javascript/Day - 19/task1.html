<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theme Toggle</title>
    <style>
        /* Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Default Theme Variables (Light) */
        :root {
            --bg-color: #ffffff;
            --text-color: #111111;
            --card-color: #f4f4f4;
            --button-bg: #111111;
            --button-text: #ffffff;
            --border-color: #dddddd;
        }

        /* Automatically detect browser/system dark mode */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #121212;
                --text-color: #ffffff;
                --card-color: #1e1e1e;
                --button-bg: #ffffff;
                --button-text: #121212;
                --border-color: #333333;
            }
        }

        /* These classes will be toggled using JS */
        .light-theme {
            --bg-color: #ffffff;
            --text-color: #111111;
            --card-color: #f4f4f4;
            --button-bg: #111111;
            --button-text: #ffffff;
            --border-color: #dddddd;
        }

        .dark-theme {
            --bg-color: #121212;
            --text-color: #ffffff;
            --card-color: #1e1e1e;
            --button-bg: #ffffff;
            --button-text: #121212;
            --border-color: #333333;
        }

        /* Body */
        body {
            background: var(--bg-color);
            color: var(--text-color);
            font-family: Arial, Helvetica, sans-serif;

            display: flex;
            justify-content: center;
            align-items: center;

            min-height: 100vh;

            transition:
                background-color 0.3s ease,
                color 0.3s ease;
        }

        /* Card */
        .container {
            background: var(--card-color);
            padding: 2rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);

            text-align: center;
            width: 350px;

            transition: all 0.3s ease;
        }

        /* Heading */
        h1 {
            margin-bottom: 1rem;
        }

        /* Paragraph */
        p {
            margin-bottom: 1.5rem;
            opacity: 0.8;
        }

        /* Button */
        button {
            background: var(--button-bg);
            color: var(--button-text);

            border: none;
            outline: none;

            padding: 12px 24px;
            border-radius: 8px;

            cursor: pointer;
            font-size: 16px;

            transition: transform 0.2s ease;
        }

        button:hover {
            transform: translateY(-2px);
        }

        button:active {
            transform: scale(0.98);
        }
    </style>
</head>

<body class="dark-theme">

    <div class="container">
        <h1>Theme Preference</h1>
        <p>Current browser theme detected.</p>

        <button id="toggleTheme">
            Toggle Theme
        </button>
    </div>

    <script src="task1.js"></script>
</body>

</html>
