<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Search Cards</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            min-height:100vh;
            background:#000;
            padding:40px;
        }

        /* Search Box */
        #search{
            display:block;
            width:300px;
            margin:0 auto 40px;
            padding:16px 20px;
            border:none;
            outline:none;
            border-radius:8px;
            background:#111;
            color:#fff;
            font-size:16px;
        }

        /* Cards Container */
        #users-container{
            display:flex;
            flex-wrap:wrap;
            justify-content:center;
            gap:25px;
        }

        /* Card */
        .card{
            width:180px;
            height:260px;
            position:relative;
            overflow:hidden;
            border-radius:25px;
            cursor:pointer;
            transition:transform 0.3s;
        }

        .card:hover{
            transform:scale(1.05);
        }

        /* Image */
        .card img{
            width:100%;
            height:100%;
            object-fit:cover;
        }

        /* Blur Layer */
        .blurred-layer{
            position:absolute;
            left:0;
            bottom:0;
            width:100%;
            height:95px;

            backdrop-filter:blur(15px);
            -webkit-backdrop-filter:blur(15px);

            background:rgba(255,255,255,0.05);

            mask-image:linear-gradient(
                to top,
                rgba(0,0,0,1),
                rgba(0,0,0,0)
            );
        }

        /* Text Content */
        .content{
            position:absolute;
            left:15px;
            right:15px;
            bottom:15px;
            color:white;
            z-index:10;
        }

        .content h3{
            font-size:16px;
            margin-bottom:8px;
            text-transform:capitalize;
        }

        .content p{
            font-size:12px;
            line-height:1.4;
            color:rgba(255,255,255,0.8);
        }
    </style>
</head>

<body>

    <!-- Search -->
    <input
        id="search"
        type="text"
        placeholder="Search..."
    >

    <!-- JavaScript will insert cards here -->
    <div id="users-container"></div>

    <script src="searchfilter.js"></script>

</body>
</html>
